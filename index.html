<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AuraFlow</title>
  <meta name="description" content="AuraFlow voit le jour pour illuminer votre journée." />
  <meta name="theme-color" content="#F97316" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./assets/logo.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./assets/logo.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <!-- Loading / Phoenix (ailes fermées → déploiement) -->
  <div id="loading">
    <div class="phx-stage">
      <span class="glow"></span>
      <svg class="phx-anim" viewBox="0 0 200 200" role="img" aria-label="AuraFlow">
        <defs>
          <linearGradient id="aphx" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#FFD24D"/><stop offset="0.45" stop-color="#FFA51F"/><stop offset="1" stop-color="#F97316"/>
          </linearGradient>
          <linearGradient id="aphxL" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#FFF1C2"/><stop offset="1" stop-color="#FFC247"/>
          </linearGradient>
        </defs>
        <g class="wings" fill="url(#aphx)">
          <path d="M104 92 C128 78 150 60 178 40 C160 70 150 86 130 100 C150 96 166 86 186 74 C168 100 150 112 126 118 C108 122 102 110 104 92 Z"/>
          <path d="M104 104 C124 100 146 96 172 92 C152 112 132 122 112 124 C104 124 100 114 104 104 Z"/>
          <path d="M96 92 C72 78 50 60 22 40 C40 70 50 86 70 100 C50 96 34 86 14 74 C32 100 50 112 74 118 C92 122 98 110 96 92 Z"/>
          <path d="M96 104 C76 100 54 96 28 92 C48 112 68 122 88 124 C96 124 100 114 96 104 Z"/>
        </g>
        <g class="core">
          <path fill="url(#aphxL)" d="M100 36 C92 40 88 48 92 56 C84 52 78 54 76 60 C82 60 86 64 88 70 C84 84 88 100 100 108 C112 100 116 84 112 70 C114 64 118 60 124 60 C122 54 116 52 108 56 C112 48 108 40 100 36 Z"/>
          <path fill="#F97316" d="M108 44 C116 42 122 44 126 48 C120 50 114 50 110 50 Z"/>
          <path fill="url(#aphx)" d="M100 108 C94 124 96 140 88 156 C84 168 90 178 100 184 C110 178 116 168 112 156 C104 140 106 124 100 108 Z"/>
          <path fill="url(#aphxL)" d="M100 120 C97 134 98 150 92 162 C90 170 94 176 100 180 C106 176 110 170 108 162 C102 150 103 134 100 120 Z"/>
        </g>
      </svg>
    </div>
    <p class="tag" data-i18n="tagline"></p>
    <div class="bar"><i></i></div>
  </div>

  <div class="app">
    <header class="topbar glass" style="border-radius:0 0 18px 18px">
      <div class="brand">
        <img src="./assets/logo.svg" alt="" />
        <span class="name">AuraFlow</span>
      </div>
      <select class="lang" id="lang" aria-label="Language"></select>
    </header>

    <!-- Welcome -->
    <section class="screen" id="welcome">
      <div class="hero glass">
        <img class="phoenix" src="./assets/logo.svg" alt="" />
        <h1 data-i18n="welcome.title"></h1>
        <p class="muted" data-i18n="welcome.subtitle"></p>
        <p class="muted" data-i18n="welcome.time" style="font-weight:600"></p>
        <button class="btn btn-primary" id="start" style="margin-top:10px" data-i18n="welcome.cta"></button>
      </div>
    </section>

    <!-- QCM -->
    <section class="screen" id="qcm">
      <div class="qcm-wrap">
        <div class="progress">
          <span class="chip" id="chip"></span>
          <div class="track"><i id="fill" style="width:0"></i></div>
          <span class="muted" id="count" style="font-size:13px"></span>
        </div>
        <div class="glass card" id="qcard"></div>
        <div class="nav">
          <button class="btn btn-ghost" id="back" data-i18n="back"></button>
          <button class="btn btn-primary" id="next" disabled></button>
        </div>
      </div>
    </section>

    <!-- Simulation -->
    <section class="screen" id="sim">
      <div class="glass card center" style="width:100%">
        <img class="phoenix" src="./assets/logo.svg" alt="" style="width:84px;animation:rise 3s ease-in-out infinite" />
        <h2 id="sim-analyzing"></h2>
        <ul class="sim-steps" id="sim-steps"></ul>
        <div id="sim-result" style="display:none">
          <h2 data-i18n="sim.title" style="margin-top:18px"></h2>
          <p class="muted" data-i18n="sim.subtitle"></p>
          <div class="modules" id="modules"></div>
          <button class="btn btn-primary" id="to-pricing" style="margin-top:22px" data-i18n="sim.cta"></button>
        </div>
      </div>
    </section>

    <!-- Pricing -->
    <section class="screen" id="pricing">
      <div style="width:100%;text-align:center">
        <h1 data-i18n="pricing.title"></h1>
        <p class="muted" data-i18n="pricing.subtitle" style="margin-bottom:8px"></p>
        <span class="trial" id="trial"></span>
        <div class="plans" id="plans"></div>
        <p class="muted" id="pricing-note" style="margin-top:16px;font-size:13px"></p>
      </div>
    </section>

    <footer>
      <p>© <span id="year"></span> AuraFlow — <span data-i18n="tagline"></span></p>
    </footer>
  </div>

  <div class="toast" id="toast"></div>

  <script src="./js/i18n.js"></script>
  <script src="./js/qcm.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
